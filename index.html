<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05070d" />
    <title>PersonalS3 — Live</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #05070d;
        overflow: hidden;
        overscroll-behavior: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        touch-action: none; /* orbit controls own all gestures */
      }
      #stats {
        position: fixed;
        top: 10px;
        left: 12px;
        font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #00e5ff;
        text-shadow: 0 0 6px rgba(0, 229, 255, 0.5);
        user-select: none;
        pointer-events: none;
        display: none;
        z-index: 10;
      }
      .label {
        font: 600 10px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        white-space: nowrap;
        color: rgba(200, 220, 235, 0.78);
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.9);
        user-select: none;
      }
      .label-dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: 1px;
        box-shadow: 0 0 6px currentColor;
      }
      .counter {
        font: 700 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.06em;
        white-space: nowrap;
        color: #7fe9ff;
        text-shadow:
          0 0 8px rgba(0, 229, 255, 0.55),
          0 1px 6px rgba(0, 0, 0, 0.9);
        user-select: none;
      }
      #hud {
        position: fixed;
        left: 12px;
        bottom: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
        font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        color: rgba(160, 190, 210, 0.7);
        user-select: none;
        pointer-events: none;
        z-index: 10;
      }
      #hud-source {
        padding: 2px 7px;
        border: 1px solid rgba(255, 176, 32, 0.5);
        border-radius: 3px;
        color: #ffb020;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="stats"></div>
    <div id="hud">
      <span id="hud-source">MOCK DATA</span>
      <span id="hud-uptime">up —</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
